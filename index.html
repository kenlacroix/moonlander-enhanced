<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MoonLander</title>
  <meta name="description" content="MoonLander Enhanced — a browser-based, AI-enhanced reimagining of the 1979 Moon Lander arcade game. Real lunar physics, historic Apollo missions, in-browser AI agents that learn to land, procedural terrain, and a 3D mode. No install." />
  <meta name="author" content="Kenneth LaCroix" />
  <link rel="author" href="https://kennethlacroix.me" />
  <meta property="og:title" content="MoonLander Enhanced" />
  <meta property="og:description" content="A browser-based, AI-enhanced reimagining of the 1979 Moon Lander arcade game." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://canyou.land" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#00ff88" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                      background: #000;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      /* 100dvh = dynamic viewport, collapses with iOS URL bar */
                      width: 100vw;
                      height: 100dvh;
                      overflow: hidden;
                    }
                    /* Sprint 7.5 — pure-CSS aspect-ratio sizing.
                       The previous JS-driven fitCanvasToWindow had
                       iOS timing problems (window.innerHeight wrong
                       during URL-bar collapse). CSS aspect-ratio +
                       max-width/height lets the browser handle it
                       correctly across all viewport changes.

                       Sprint 6 dual-canvas: GL on bottom, UI on top.
                       Both must size identically. Setting the same
                       max constraints + aspect-ratio on both produces
                       lockstep sizing without JS coordination. */
                    #game-stage {
                      position: relative;
                      line-height: 0;
                      aspect-ratio: 16 / 9;
                      max-width: 100vw;
                      max-height: 100dvh;
                      width: auto;
                      height: auto;
                    }
                    #game-canvas-gl,
                    #game-canvas {
                      display: block;
                      image-rendering: pixelated;
                      touch-action: none;
                      user-select: none;
                      width: 100%;
                      height: 100%;
                    }
                    #game-canvas-gl {
                      position: absolute;
                      left: 0;
                      top: 0;
                    }
                    #game-canvas {
                      position: relative;
                      z-index: 1;
                    }
                    /* v0.6.13.0 — site credit + founder's-story opener.
                       A real crawlable reciprocal link to the author's
                       site (SEO), plus a button into the in-game story
                       overlay. Sits in the letterbox below the game;
                       suppressed in embed mode. */
                    #site-credit {
                      position: fixed;
                      bottom: 6px;
                      left: 0;
                      right: 0;
                      z-index: 5;
                      text-align: center;
                      font-family: "Courier New", monospace;
                      font-size: 11px;
                      color: #5a7a8a;
                      letter-spacing: 0.04em;
                      pointer-events: none;
                    }
                    #site-credit a,
                    #site-credit button {
                      color: #8fd6ff;
                      text-decoration: none;
                      background: none;
                      border: none;
                      font: inherit;
                      cursor: pointer;
                      pointer-events: auto;
                    }
                    #site-credit a:hover,
                    #site-credit button:hover {
                      text-decoration: underline;
                    }
                    body.embed #site-credit {
                      display: none;
                    }
                    /* v0.6.2.3 — portrait-phone nag overlay.
                       The game is 1280x720 fixed-aspect; rendered into
                       a phone's portrait viewport (e.g. 375x812) it
                       letterboxes to ~375x211 with 70% of the screen
                       black. This overlay covers that dead space and
                       tells the player to rotate.
                       Gated on `(pointer: coarse)` so desktop users
                       with tall windows don't get nagged, and on
                       portrait orientation so the overlay disappears
                       as soon as they rotate. */
                    #rotate-nag {
                      display: none;
                      position: fixed;
                      inset: 0;
                      z-index: 10;
                      background: #000;
                      color: #00ff88;
                      font-family: "Courier New", monospace;
                      align-items: center;
                      justify-content: center;
                      flex-direction: column;
                      padding: 2em;
                      text-align: center;
                      gap: 1em;
                    }
                    #rotate-nag .icon {
                      font-size: 4em;
                      animation: rotate-hint 2s ease-in-out infinite;
                    }
                    #rotate-nag h1 {
                      font-size: 1.5em;
                      letter-spacing: 0.1em;
                      margin: 0;
                    }
                    #rotate-nag p {
                      font-size: 1em;
                      opacity: 0.7;
                      max-width: 16em;
                    }
                    @keyframes rotate-hint {
                      0%, 100% { transform: rotate(0deg); }
                      50% { transform: rotate(90deg); }
                    }
                    @media (orientation: portrait) and (pointer: coarse) {
                      #rotate-nag { display: flex; }
                    }
                    /* Embed mode: the embedder controls iframe size.
                       Asking the user to rotate their phone won't change
                       a fixed-portrait iframe in someone's blog post, so
                       the nag becomes a useless blackout. main.ts adds
                       `body.embed` when `?embed=1` is present. */
                    body.embed #rotate-nag { display: none !important; }
                    /* Sprint 7.5 — AI Theater mobile fallback. Below
                       900px viewport, the 360px right-side panel
                       crowds the canvas down to ~480px wide on most
                       phones. Take the full width instead and let the
                       panel cover the canvas; user exits via the
                       always-visible EXIT button in the panel header. */
                    @media (max-width: 900px) {
                      #ai-theater-panel {
                        width: 100% !important;
                        border-left: none !important;
                      }
                    }
                    /* Respect prefers-reduced-motion for accessibility —
                       users who've asked for less animation still get
                       the overlay, just without the rotating icon. */
                    @media (prefers-reduced-motion: reduce) {
                      #rotate-nag .icon { animation: none; }
                    }
  </style>
</head>
<body>
  <div id="game-stage">
    <canvas id="game-canvas-gl"></canvas>
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="rotate-nag" role="alert" aria-live="polite">
    <div class="icon" aria-hidden="true">↻</div>
    <h1>ROTATE YOUR PHONE</h1>
    <p>MoonLander uses a landscape cockpit view. Turn your phone sideways to fly.</p>
  </div>
  <footer id="site-credit">
    Built by <a href="https://kennethlacroix.me/blog/moonlander-enhanced" target="_blank" rel="author">Kenneth&nbsp;LaCroix</a>
    &nbsp;·&nbsp; <button id="open-story" type="button">The&nbsp;Story</button>
  </footer>
  <script type="module" src="/src/main.ts"></script>
  <script>
    if ("serviceWorker" in navigator) {
              navigator.serviceWorker.register("/sw.js").catch(() => {});
            }
  </script>
</body>
</html>
